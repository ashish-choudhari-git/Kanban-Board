<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kanban Board</title>
</head>

<body>
    <main>
        <nav>
            <div class="navbar">
                <div class="left">
                    <h2>Kanban Board</h2>
                </div>
                <div class="right">
                    <button id="open-modal" type="button">Add new Task</button>
                </div>
            </div>

        </nav>


        <section class="board">

            <div id="todo" class="task-column">

                <div class="column-top-bar">
                    <h3>Todo</h3>
                    <h3 class="task-count">20</h3>
                </div>

                <!-- task will be added here -->
            </div>

            <div id="progress" class="task-column">

                <div class="column-top-bar">
                    <h3>In Progress</h3>
                    <h3 class="task-count">20</h3>
                </div>

                <!-- task will be added here -->

            </div>


            <div id="done" class="task-column">

                <div class="column-top-bar">
                    <h3>Done</h3>
                    <h3 class="task-count">20</h3>
                </div>
                
                <!-- task will be added here -->

            </div>

        </section>
    </main>

    <div class="modal add-new-task">
        <div class="bg"></div>
        <div class="modal-box">
            <h2>Add New Task</h2>
            <input type="text" class="task-title" placeholder="Enter title">
            <input type="textarea" class="task-description" placeholder="Enter description">
            <button id="add-new-task">Add new Task</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
